<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Models | NextFrame</title>
    <meta name="description" content="Model profile index for NextFrame portfolio pages." />
    <style>
      :root {
        --paper: #fbfaf7;
        --ink: #171717;
        --muted: #706a63;
        --line: #d7d0c8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--paper);
        color: var(--ink);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(860px, calc(100% - 36px));
        margin: 0 auto;
        padding: 72px 0;
      }

      h1 {
        margin: 0 0 30px;
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(4rem, 13vw, 8rem);
        font-weight: 400;
        line-height: 0.9;
        letter-spacing: 0;
      }

      a {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 18px;
        align-items: center;
        padding: 22px 0;
        border-top: 1px solid var(--line);
        color: inherit;
        text-decoration: none;
      }

      a:last-child {
        border-bottom: 1px solid var(--line);
      }

      strong {
        display: block;
        font-family: Georgia, "Times New Roman", serif;
        font-size: 2rem;
        font-weight: 400;
      }

      span {
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Models</h1>
      <a href="./glyzel-suyat/">
        <span>
          <strong>Glyzel Suyat</strong>
          Model profile and booking page
        </span>
        <span aria-hidden="true">Open</span>
      </a>
    </main>
  </body>
</html>

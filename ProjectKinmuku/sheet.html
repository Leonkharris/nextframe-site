<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>金無垢 · Character Sheet</title>
<script src="data.js"></script>
<style>
:root{
  --ink:#0a0c12; --panel:#141824; --panel2:#1b2030; --line:rgba(201,162,75,.20); --line2:rgba(201,162,75,.38);
  --gold:#c9a24b; --gold-b:#e8cf8b; --gold-d:#8f7638; --text:#e9e4d7; --muted:#948f82; --faint:#5f5b52;
  --cjk:"Songti SC","Yu Mincho","Hiragino Mincho ProN","Microsoft YaHei",serif;
  --serif:"Songti SC","Yu Mincho",Georgia,serif; --sans:"Helvetica Neue",system-ui,"Segoe UI",sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:#06070b;color:var(--text);font-family:var(--sans);padding:24px;display:flex;justify-content:center}
#sheet{width:1440px;max-width:100%;background:
  linear-gradient(160deg,#0d1018,#090b11);
  border:1px solid var(--line2);border-radius:10px;overflow:hidden;position:relative;
  box-shadow:0 20px 60px rgba(0,0,0,.6)}
#sheet::before{content:"";position:absolute;inset:0;pointer-events:none;
  background:repeating-linear-gradient(0deg,rgba(255,255,255,.010) 0 1px,transparent 1px 3px);}
/* header */
.hd{display:flex;align-items:stretch;border-bottom:1px solid var(--line2);background:linear-gradient(90deg,#12151f,#0b0e15)}
.hd .brand{padding:16px 22px;border-right:1px solid var(--line);display:flex;flex-direction:column;justify-content:center;min-width:150px}
.hd .brand .k{font-family:var(--cjk);font-size:26px;font-weight:600;letter-spacing:3px;
  background:linear-gradient(180deg,var(--gold-b),var(--gold-d));-webkit-background-clip:text;background-clip:text;color:transparent}
.hd .brand .r{font-size:9px;letter-spacing:3px;color:var(--muted);margin-top:2px}
.hd .name{flex:1;padding:14px 22px;display:flex;flex-direction:column;justify-content:center}
.hd .name .kanji{font-family:var(--cjk);font-size:30px;font-weight:600;letter-spacing:2px;line-height:1}
.hd .name .rom{font-size:13px;color:var(--muted);letter-spacing:3px;margin-top:4px}
.hd .fields{display:grid;grid-template-columns:repeat(4,auto);gap:0;border-left:1px solid var(--line)}
.hd .f{padding:10px 18px;border-left:1px solid var(--line);display:flex;flex-direction:column;justify-content:center;min-width:96px}
.hd .f .k{font-size:8px;letter-spacing:2px;color:var(--gold-d);text-transform:uppercase}
.hd .f .v{font-size:12px;color:var(--text);margin-top:3px;font-weight:600}
/* body grid */
.body{display:grid;grid-template-columns:300px 1fr 300px;gap:0}
.col{padding:0}
.col.mid{border-left:1px solid var(--line);border-right:1px solid var(--line)}
.block{padding:14px 18px;border-bottom:1px solid var(--line)}
.block h3{font-size:10px;letter-spacing:2px;color:var(--gold-b);text-transform:uppercase;margin-bottom:9px;display:flex;justify-content:space-between}
.block h3 .cn{font-family:var(--cjk);color:var(--gold);letter-spacing:1px}
.summary{font-size:12.5px;line-height:1.6;color:#d3cdbe}
.summary .em{color:var(--gold-b);font-style:italic}
/* consistency anchors */
.anchor{font-size:11.5px;line-height:1.5;padding:5px 0;border-bottom:1px dashed rgba(201,162,75,.10);color:#d0cabb;display:flex;gap:8px}
.anchor::before{content:"◆";color:var(--gold-d);font-size:9px;margin-top:3px}
.anchor.prop{color:var(--muted)}
.anchor .cn{font-family:var(--cjk);display:block;color:#e0dac9}
.anchor .en{display:block;color:var(--muted);font-size:10.5px;margin-top:1px}
/* palette */
.pal{display:flex;gap:6px;flex-wrap:wrap}
.sw{width:46px;text-align:center}
.sw .chip{height:34px;border-radius:5px;border:1px solid rgba(255,255,255,.12)}
.sw .lb{font-size:8px;color:var(--muted);margin-top:3px;letter-spacing:.3px}
/* reference images */
.refwrap{padding:14px 18px;border-bottom:1px solid var(--line)}
.refgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.refcell{border:1px solid var(--line);border-radius:6px;overflow:hidden;background:#0b0e15;position:relative;aspect-ratio:3/4}
.refcell.wide{grid-column:1 / -1;aspect-ratio:16/7}
.refcell img{width:100%;height:100%;object-fit:cover;display:block}
.refcell .tag{position:absolute;top:6px;left:6px;font-size:8px;letter-spacing:1px;background:rgba(0,0,0,.6);color:var(--gold-b);padding:2px 7px;border-radius:4px;border:1px solid var(--line)}
.ph{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;text-align:center;padding:12px;color:var(--faint)}
.ph .big{font-family:var(--cjk);font-size:26px;color:var(--gold-d);opacity:.5}
.ph .t{font-size:10px;letter-spacing:1px;color:var(--muted)}
.ph .h{font-size:9px;color:var(--faint);line-height:1.4}
/* storyboard */
.sb{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.shot{border:1px solid var(--line);border-radius:6px;padding:9px 11px;background:linear-gradient(160deg,#12151f,#0c0f16);position:relative}
.shot .n{font-family:var(--serif);font-size:11px;color:var(--gold);letter-spacing:1px;font-weight:700}
.shot .txt{font-size:11px;line-height:1.45;color:#cfc9ba;margin-top:4px}
.shot .txt .cn{font-family:var(--cjk);display:block;color:#ded8c8}
.shot .txt .en{display:block;color:var(--muted);font-size:10px;margin-top:2px}
/* key lines */
.qt{font-family:var(--cjk);color:var(--gold-b);font-size:13.5px;line-height:1.45;padding:7px 0 7px 12px;border-left:2px solid var(--gold-d);margin-bottom:8px}
.qt .en{display:block;font-family:var(--sans);color:var(--muted);font-size:11px;font-style:italic;margin-top:2px}
/* lists */
.li{font-size:11.5px;line-height:1.5;padding:4px 0;border-bottom:1px dashed rgba(201,162,75,.09);color:#cfc9ba}
.li .cn{font-family:var(--cjk);display:block}
.li .en{display:block;color:var(--muted);font-size:10.5px;margin-top:1px}
.li.prop{opacity:.8}
.foot{display:flex;justify-content:space-between;align-items:center;padding:10px 22px;border-top:1px solid var(--line2);font-size:9px;color:var(--faint);letter-spacing:1px;background:#0b0e15}
.foot .seed{color:var(--gold);border:1px solid var(--line2);padding:3px 10px;border-radius:10px}
.toolbar{width:1440px;max-width:100%;display:flex;gap:10px;margin-bottom:14px;align-items:center}
.toolbar a,.toolbar button{font-size:12px;color:var(--muted);background:var(--panel);border:1px solid var(--line);padding:7px 13px;border-radius:8px;cursor:pointer;text-decoration:none}
.toolbar a:hover,.toolbar button:hover{color:var(--gold-b);border-color:var(--line2)}
.toolbar .nav{margin-left:auto;display:flex;gap:8px}
@media print{body{background:#fff;padding:0}.toolbar{display:none}#sheet{box-shadow:none;border:none;width:100%}}
</style>

<div class="toolbar">
  <a href="index.html">← Codex</a>
  <button onclick="window.print()">⎙ Print / PDF</button>
  <span style="font-size:11px;color:var(--faint)">SeeDance-ready production sheet · drop turnaround art into assets/sheets/</span>
  <span class="nav"><a id="prev">‹ prev</a><a id="next">next ›</a></span>
</div>
<div id="sheet"></div>

<script>
const D = window.KINMUKU_DATA;
const esc = s => (s||'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
const q = new URLSearchParams(location.search);
const id = q.get('id') || '01';
const c = D.characters.find(x=>x.id===id) || D.characters[0];
const a = D.archetypes.find(x=>x.key===c.archetypeKey)||{};
const sec = kw => c.sections.find(s=>new RegExp(kw,'i').test(s.cn+' '+s.en));
const idx = D.characters.findIndex(x=>x.id===c.id);
const prev = D.characters[(idx+14)%15], next = D.characters[(idx+1)%15];

// reference cell: image if present else placeholder
function refCell(file, tag, phTitle, phHint, wide){
  const ph = `<div class="ph"><div class="big">${esc(c.kanji)}</div><div class="t">${phTitle}</div><div class="h">${phHint}</div></div>`;
  const fb = ph.replace(/"/g,'&quot;');
  return `<div class="refcell${wide?' wide':''}"><span class="tag">${tag}</span>`+
    `<img src="${file}" onerror="this.outerHTML=this.getAttribute('data-fb')" data-fb="${fb}"></div>`;
}
// bilingual list from a section's pairs
function pairs(s, cls){ if(!s) return ''; return s.pairs.map(p=>
  `<div class="${cls}${p.proposal?' prop':''}"><span class="cn">${esc(p.cn)}</span><span class="en">${esc(p.en)}</span></div>`).join(''); }

// STORYBOARD from Part One arc (each arc line = a shot)
function storyboard(){
  const s = sec('故事線|Story Arc|Part One'); if(!s) return '<div class="summary" style="color:var(--muted)">No Part One arc on record — reserved character.</div>';
  return `<div class="sb">`+ s.pairs.map((p,i)=>{
    const m = p.en.match(/^(Prologue|Chapter \d+)\s*[:—-]/); const beat = m?m[1].toUpperCase():('SHOT '+(i+1));
    const cn = p.cn.replace(/^[^：:]+[：:]/,'').trim(); const en = p.en.replace(/^(Prologue|Chapter \d+)\s*[:—-]\s*/,'').trim();
    return `<div class="shot"><div class="n">${String(i+1).padStart(2,'0')} · ${beat}</div>
      <div class="txt"><span class="cn">${esc(cn)}</span><span class="en">${esc(en)}</span></div></div>`;
  }).join('') + `</div>`;
}

const palette = [
  ['#0a0c12','sumi'], [c.color,'archetype'], [c.color2,'accent'], ['#c98a3c','lantern'], ['#c9a24b','gold 金']
];

document.getElementById('sheet').innerHTML = `
  <div class="hd">
    <div class="brand"><div class="k">金無垢</div><div class="r">KINMUKU</div></div>
    <div class="name"><div class="kanji">${esc(c.kanji)}</div><div class="rom">${esc(c.romaji)}</div></div>
    <div class="fields">
      <div class="f"><div class="k">Species</div><div class="v">${esc(c.species_en)}</div></div>
      <div class="f"><div class="k">Archetype</div><div class="v" style="color:${c.color2}">${esc(a.en||'')}</div></div>
      <div class="f"><div class="k">Priority</div><div class="v">${esc(c.priority)}</div></div>
      <div class="f"><div class="k">Status</div><div class="v">${c.active?'Part One':'Reserved'}</div></div>
    </div>
  </div>
  <div class="body">
    <div class="col">
      <div class="block"><h3>Character Summary <span class="cn">角色概要</span></h3>
        <div class="summary"><span class="em">${esc(c.roleline)}.</span> ${sec('氣質|Temperament')?esc(sec('氣質|Temperament').pairs.map(p=>p.en).join(' ')):''}</div></div>
      <div class="block"><h3>Consistency Anchors <span class="cn">一致性錨點</span></h3>
        ${(sec('外貌|Appearance')?sec('外貌|Appearance').pairs:[]).map(p=>
          `<div class="anchor${p.proposal?' prop':''}"><div><span class="cn">${esc(p.cn)}</span><span class="en">${esc(p.en)}</span></div></div>`).join('')}</div>
      <div class="block"><h3>Color Palette <span class="cn">色彩指定</span></h3>
        <div class="pal">${palette.map(([hex,lb])=>`<div class="sw"><div class="chip" style="background:${hex}"></div><div class="lb">${lb}</div></div>`).join('')}</div></div>
      <div class="block"><h3>Voice / Performance <span class="cn">聲音表演</span></h3>${pairs(sec('聲音|Voice'),'li')||'<div class="li" style="color:var(--muted)">See profile.</div>'}</div>
    </div>
    <div class="col mid">
      <div class="refwrap"><h3 style="font-size:10px;letter-spacing:2px;color:var(--gold-b);text-transform:uppercase;margin-bottom:10px;">Character Reference Sheet <span style="color:var(--gold);font-family:var(--cjk)">角色設定</span></h3>
        <div class="refgrid">
          ${refCell('assets/portraits/'+c.id+'.png','@Image1 · HERO','HERO CONCEPT','Generate the locked hero design',false)}
          ${refCell('assets/sheets/'+c.id+'-turnaround.png','@Image2 · MODEL SHEET','TURNAROUND + EXPRESSIONS','Nano Banana 2 · Template A (identity-locked)',false)}
          ${refCell('assets/sheets/'+c.id+'-env.png','@Image3 · ENVIRONMENT','ENVIRONMENT SHEET','Key Edo location plates',true)}
        </div>
      </div>
      <div class="refwrap" style="border-bottom:none"><h3 style="font-size:10px;letter-spacing:2px;color:var(--gold-b);text-transform:uppercase;margin-bottom:10px;">Arc Storyboard <span style="color:var(--gold);font-family:var(--cjk)">分鏡故事板</span></h3>
        ${storyboard()}</div>
    </div>
    <div class="col">
      <div class="block"><h3>Key Lines <span class="cn">關鍵台詞</span></h3>
        ${(sec('台詞|Key Lines')?sec('台詞|Key Lines').pairs:[]).slice(0,6).map(p=>
          `<div class="qt">${esc(p.cn)}<span class="en">${esc(p.en)}</span></div>`).join('')}</div>
      <div class="block"><h3>Relationships <span class="cn">人物關係</span></h3>${pairs(sec('關係|Relationship'),'li')}</div>
      <div class="block"><h3>Production Checklist <span class="cn">製作資產</span></h3>${pairs(sec('資產|Production|Checklist'),'li')}</div>
    </div>
  </div>
  <div class="foot"><span>金無垢 · Project Kinmuku · Character Reference Sheet · ${esc(c.id)} ${esc(c.romaji)}</span>
    <span class="seed">SEEDANCE-READY · v1.0</span>
    <span>Canon by Fable · next-frame.agency/ProjectKinmuku</span></div>
`;
document.getElementById('prev').href = 'sheet.html?id='+prev.id;
document.getElementById('next').href = 'sheet.html?id='+next.id;
document.title = c.kanji+' · Character Sheet · 金無垢';
</script>

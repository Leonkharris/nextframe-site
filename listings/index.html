<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Next Frame — Listings Assistant</title>
<meta name="description" content="Chat with Sofia to build a complete, verified property listing — research, comps, and ready-to-post ad copy." />
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
<style>
  :root {
    --bg: #0c0d10;
    --panel: #14161b;
    --panel2: #181b21;
    --border: #262a33;
    --text: #ece9e2;
    --muted: #9a958a;
    --accent: #c8a96a;
    --accent-dim: rgba(200, 169, 106, 0.14);
    --green: #7fb78a;
    --red: #c97b6f;
    --user-bubble: #232730;
    --radius: 14px;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
    display: flex;
    flex-direction: column;
  }
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 22px; border-bottom: 1px solid var(--border);
    background: rgba(12,13,16,0.9); backdrop-filter: blur(8px);
  }
  .brand { display: flex; flex-direction: column; gap: 2px; }
  .brand .mark {
    font-size: 0.7rem; letter-spacing: 0.28em; color: var(--muted);
    text-transform: uppercase; font-weight: 700;
  }
  .brand h1 {
    margin: 0; font-family: Georgia, "Times New Roman", serif;
    font-size: 1.25rem; font-weight: 500; letter-spacing: 0.01em;
  }
  .brand h1 em { color: var(--accent); font-style: italic; }
  .header-actions { display: flex; gap: 10px; }
  button.ghost {
    background: transparent; color: var(--muted); border: 1px solid var(--border);
    border-radius: 999px; padding: 7px 16px; font-size: 0.8rem; cursor: pointer;
    transition: all .15s;
  }
  button.ghost:hover { color: var(--text); border-color: var(--accent); }
  button.ghost.small { padding: 4px 11px; font-size: 0.85rem; }

  .layout {
    flex: 1; display: grid; grid-template-columns: 1fr 400px;
    gap: 0; min-height: 0; max-width: 1500px; width: 100%; margin: 0 auto;
  }
  @media (max-width: 980px) { .layout { grid-template-columns: 1fr; } .side { display: none; } }

  /* ---------- chat ---------- */
  .chat { display: flex; flex-direction: column; min-height: 0; border-right: 1px solid var(--border); }
  .messages { flex: 1; overflow-y: auto; padding: 26px 30px 10px; display: flex; flex-direction: column; gap: 16px; }
  .msg { max-width: 78%; line-height: 1.55; font-size: 0.95rem; }
  .msg.user {
    align-self: flex-end; background: var(--user-bubble);
    padding: 11px 16px; border-radius: var(--radius); border-bottom-right-radius: 4px;
    white-space: pre-wrap;
  }
  .msg.bot { align-self: flex-start; }
  .msg.bot .who {
    font-size: 0.68rem; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--accent); margin-bottom: 6px; font-weight: 700;
  }
  .msg.bot .body :is(p, ul, ol) { margin: 0 0 10px; }
  .msg.bot .body :is(p, ul, ol):last-child { margin-bottom: 0; }
  .msg.bot .body a { color: var(--accent); }
  .msg.bot .body code { background: var(--panel2); padding: 1px 5px; border-radius: 5px; font-size: 0.85em; }
  .msg.bot .body table { border-collapse: collapse; margin: 8px 0; font-size: 0.86rem; display: block; overflow-x: auto; }
  .msg.bot .body th, .msg.bot .body td { border: 1px solid var(--border); padding: 6px 10px; text-align: left; }
  .msg.bot .body th { background: var(--panel2); color: var(--muted); font-weight: 600; }
  .msg.error { align-self: center; color: var(--red); font-size: 0.85rem; }

  .status-line {
    min-height: 22px; padding: 0 30px 4px; color: var(--muted);
    font-size: 0.8rem; font-style: italic; display: flex; align-items: center; gap: 8px;
  }
  .status-line .dot {
    width: 7px; height: 7px; border-radius: 50%; background: var(--accent);
    animation: pulse 1.1s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { opacity: .25 } 50% { opacity: 1 } }

  .chips { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
  .chips button {
    background: var(--accent-dim); color: var(--accent); border: 1px solid transparent;
    border-radius: 999px; padding: 8px 18px; font-size: 0.85rem; cursor: pointer;
  }
  .chips button:hover { border-color: var(--accent); }

  .composer { padding: 14px 30px 20px; }
  .composer form {
    display: flex; gap: 10px; background: var(--panel); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 8px 8px 8px 18px;
  }
  .composer form:focus-within { border-color: var(--accent); }
  .composer textarea {
    flex: 1; background: transparent; border: 0; outline: 0; resize: none;
    color: var(--text); font: inherit; font-size: 0.95rem; max-height: 140px; padding: 8px 0;
  }
  .composer button.send {
    background: var(--accent); color: #15130d; border: 0; border-radius: 10px;
    padding: 0 22px; font-weight: 700; font-size: 0.9rem; cursor: pointer;
  }
  .composer button.send:disabled { opacity: 0.45; cursor: default; }

  /* ---------- side panel ---------- */
  .side { display: flex; flex-direction: column; min-height: 0; overflow-y: auto; background: var(--panel); }
  .side section { padding: 20px 22px; border-bottom: 1px solid var(--border); }
  .side h2 {
    margin: 0 0 4px; font-family: Georgia, serif; font-weight: 500;
    font-size: 1.02rem; letter-spacing: 0.02em;
  }
  .side .sub { color: var(--muted); font-size: 0.78rem; margin: 0 0 14px; }

  /* Sofia */
  .sofia-section { padding-bottom: 16px; }
  .sofia-wrap {
    position: relative; border-radius: 12px; overflow: hidden;
    border: 1px solid var(--border); background: #000; aspect-ratio: 16 / 11;
  }
  .sofia-wrap img, .sofia-wrap video {
    width: 100%; height: 100%; object-fit: cover; display: block;
  }
  .sofia-wrap video { display: none; }
  .sofia-wrap.speaking {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent), 0 0 22px rgba(200, 169, 106, 0.35);
    animation: speakGlow 1.6s ease-in-out infinite;
  }
  @keyframes speakGlow {
    0%, 100% { box-shadow: 0 0 0 1px var(--accent), 0 0 14px rgba(200,169,106,.25); }
    50%      { box-shadow: 0 0 0 1px var(--accent), 0 0 26px rgba(200,169,106,.45); }
  }
  .sofia-meta { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
  .sofia-meta .name { font-family: Georgia, serif; font-size: 0.98rem; }
  .sofia-meta .role { color: var(--muted); font-size: 0.74rem; letter-spacing: 0.06em; }
  .sofia-status { color: var(--muted); font-size: 0.76rem; font-style: italic; margin: 8px 0 0; min-height: 16px; }
  .sofia-status .dot {
    display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent); margin-right: 6px; animation: pulse 1.1s ease-in-out infinite;
  }

  .progress { height: 5px; background: var(--panel2); border-radius: 99px; overflow: hidden; margin-bottom: 16px; }
  .progress div { height: 100%; background: var(--accent); width: 0%; transition: width .4s; }

  .fields { display: flex; flex-direction: column; gap: 0; }
  .group-label {
    font-size: 0.66rem; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--muted); margin: 14px 0 6px; font-weight: 700;
  }
  .row { display: flex; justify-content: space-between; gap: 14px; padding: 6px 0; border-bottom: 1px dashed #20242c; font-size: 0.85rem; }
  .row .k { color: var(--muted); flex-shrink: 0; }
  .row .v { text-align: right; word-break: break-word; }

  .price-card {
    background: var(--accent-dim); border: 1px solid rgba(200,169,106,.35);
    border-radius: 12px; padding: 14px 16px; margin-top: 14px;
  }
  .price-card .label { font-size: 0.7rem; letter-spacing: .15em; text-transform: uppercase; color: var(--accent); font-weight: 700; }
  .price-card .big { font-size: 1.35rem; font-family: Georgia, serif; margin: 4px 0 2px; }
  .price-card .range { color: var(--muted); font-size: 0.8rem; }
  .price-card .rationale { color: var(--text); font-size: 0.8rem; margin-top: 8px; line-height: 1.5; }

  .comp { border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; margin-top: 8px; font-size: 0.8rem; }
  .comp .src { color: var(--accent); }
  .comp a { color: var(--muted); }

  .ad-card { border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; margin-top: 12px; background: var(--panel2); }
  .ad-card .channel {
    display: inline-block; font-size: 0.65rem; letter-spacing: .14em; text-transform: uppercase;
    color: var(--accent); border: 1px solid rgba(200,169,106,.4); border-radius: 999px;
    padding: 3px 10px; font-weight: 700; margin-bottom: 8px;
  }
  .ad-card h3 { margin: 0 0 6px; font-size: 0.95rem; font-family: Georgia, serif; font-weight: 600; }
  .ad-card pre { white-space: pre-wrap; font: inherit; font-size: 0.83rem; color: var(--text); margin: 0 0 10px; line-height: 1.55; }
  .ad-card .copy-btn {
    background: transparent; border: 1px solid var(--border); color: var(--muted);
    border-radius: 8px; padding: 5px 12px; font-size: 0.75rem; cursor: pointer;
  }
  .ad-card .copy-btn:hover { color: var(--text); border-color: var(--accent); }
  .empty-note { color: #555a64; font-size: 0.82rem; font-style: italic; }
</style>
</head>
<body>
<header>
  <div class="brand">
    <span class="mark">Next Frame Agency</span>
    <h1>Listings <em>Assistant</em></h1>
  </div>
  <div class="header-actions">
    <button class="ghost" id="download-pdf" style="display:none">Listing pack (PDF)</button>
    <button class="ghost" id="download-ads" style="display:none">Ad copies (.txt)</button>
    <button class="ghost" id="new-listing">New listing</button>
  </div>
</header>

<div class="layout">
  <main class="chat">
    <div class="messages" id="messages"></div>
    <div class="status-line" id="status"></div>
    <div class="composer">
      <form id="form">
        <textarea id="input" rows="1" placeholder="Describe the property, or answer Sofia…"></textarea>
        <button class="send" id="send" type="submit">Send</button>
      </form>
    </div>
  </main>

  <aside class="side">
    <section class="sofia-section">
      <div class="sofia-wrap">
        <img id="sofia-img" src="https://next-frame.agency/sofia_avatar.png" alt="Sofia — Next Frame listing agent" />
        <video id="sofia-video" playsinline></video>
      </div>
      <div class="sofia-meta">
        <div>
          <div class="name">Sofia</div>
          <div class="role">NEXT FRAME LISTING AGENT</div>
        </div>
        <button class="ghost small" id="mute-btn" title="Toggle Sofia's voice">🔊</button>
      </div>
      <p class="sofia-status" id="sofia-status"></p>
    </section>
    <section>
      <h2>Listing record</h2>
      <p class="sub" id="progress-label">0 of 13 core details captured</p>
      <div class="progress"><div id="progress-bar"></div></div>
      <div class="fields" id="fields"><p class="empty-note">Details appear here as the conversation progresses.</p></div>
      <div id="price-area"></div>
      <div id="comps-area"></div>
    </section>
    <section>
      <h2>Ad copies</h2>
      <p class="sub">Generated after you confirm the listing.</p>
      <div id="ads"><p class="empty-note">No ad copies yet.</p></div>
    </section>
  </aside>
</div>

<script>
/* ============================================================
   API base — the same file is served by the FastAPI app (local)
   and by GitHub Pages at next-frame.agency/listings/ (production).
   - locally: same-origin ("")
   - on the domain: read from api-url.json (published next to this
     page by start-listings-live.ps1 each time the tunnel starts)
   - override anytime with ?api=https://... (persisted in localStorage)
   ============================================================ */
let API_BASE = "";
async function initApiBase() {
  const qs = new URLSearchParams(location.search).get("api");
  if (qs) localStorage.setItem("nf_api", qs.replace(/\/$/, ""));
  const saved = localStorage.getItem("nf_api");
  if (saved) { API_BASE = saved; return; }
  if (/(^|\.)next-frame\.agency$/i.test(location.hostname)) {
    try {
      const r = await fetch("api-url.json?_=" + Date.now(), { cache: "no-store" });
      if (r.ok) API_BASE = ((await r.json()).api || "").replace(/\/$/, "");
    } catch { /* falls through to offline notice on first send */ }
  }
}

const $ = (id) => document.getElementById(id);
const messagesEl = $("messages"), statusEl = $("status"), inputEl = $("input"),
      sendBtn = $("send"), formEl = $("form");

let sessionId = null;
let streaming = false;

const FIELD_GROUPS = [
  ["Property", [
    ["property_type", "Type"], ["address", "Address (per title)"], ["building_name", "Building"],
    ["city", "City"], ["neighborhood", "Neighborhood"],
  ]],
  ["Unit", [
    ["floor_number", "Floor"], ["building_total_floors", "Building floors"], ["floor_zone", "Zone"],
    ["view", "View"], ["orientation", "Facing"], ["floor_area_sqm", "Floor area (sqm)"],
    ["bedroom_type", "Bedroom type"], ["furnishing", "Furnishing"], ["maids_room", "Maid's room"],
    ["parking_slots", "Parking slots"], ["parking_notes", "Parking notes"],
  ]],
  ["Building & developer", [
    ["developer", "Developer"], ["year_built", "Year built"], ["year_turned_over", "Turned over"],
  ]],
  ["Legal & status", [
    ["title_holder", "Title held by"], ["tenanted", "Tenanted"], ["tenancy_details", "Tenancy"],
    ["status", "Listing status"],
  ]],
];
const CORE_TOTAL = 13;

function fmt(v) {
  if (typeof v === "boolean") return v ? "Yes" : "No";
  if (typeof v === "number") return v.toLocaleString();
  return String(v);
}
function php(n) { return "₱" + Number(n).toLocaleString(); }

function renderMarkdown(el, text) {
  if (window.marked && window.DOMPurify) {
    el.innerHTML = DOMPurify.sanitize(marked.parse(text));
  } else {
    el.textContent = text;
  }
}

function addUserMsg(text) {
  const div = document.createElement("div");
  div.className = "msg user";
  div.textContent = text;
  messagesEl.appendChild(div);
  scrollDown();
}

function addBotMsg() {
  const wrap = document.createElement("div");
  wrap.className = "msg bot";
  wrap.innerHTML = '<div class="who">Sofia · Next Frame</div><div class="body"></div>';
  messagesEl.appendChild(wrap);
  return wrap.querySelector(".body");
}

function addError(text) {
  const div = document.createElement("div");
  div.className = "msg error";
  div.textContent = text;
  messagesEl.appendChild(div);
  scrollDown();
}

function setStatus(text) {
  statusEl.innerHTML = text ? '<span class="dot"></span>' + text : "";
}

function scrollDown() { messagesEl.scrollTop = messagesEl.scrollHeight; }

function welcome() {
  const body = addBotMsg();
  body.innerHTML =
    "<p>Hi! I’m Sofia, your Next Frame listings assistant. Tell me about the property and " +
    "I’ll build a complete, verified listing with you — researched neighborhood info, a " +
    "market-based price check, and ready-to-post ad copy.</p>" +
    "<p>What type of property are we listing today?</p>";
  const chips = document.createElement("div");
  chips.className = "chips";
  for (const label of ["Condo", "House & Lot", "Commercial"]) {
    const b = document.createElement("button");
    b.textContent = label;
    b.onclick = () => { chips.remove(); send(label); };
    chips.appendChild(b);
  }
  body.appendChild(chips);
  scrollDown();
}

async function ensureSession() {
  if (sessionId) return sessionId;
  const saved = sessionStorage.getItem("nf_session");
  if (saved) { sessionId = saved; return sessionId; }
  try {
    const res = await fetch(API_BASE + "/api/session", { method: "POST" });
    sessionId = (await res.json()).session_id;
    sessionStorage.setItem("nf_session", sessionId);
    return sessionId;
  } catch {
    throw new Error("Sofia is offline right now — the listings engine isn't reachable. Please try again later.");
  }
}

async function send(text) {
  if (streaming || !text.trim()) return;
  streaming = true;
  sendBtn.disabled = true;
  addUserMsg(text.trim());
  setStatus("Connecting…");
  avatarTurnStarting();

  let bodyEl = null, buffer = "", acc = "";
  try {
    await ensureSession();
    const res = await fetch(API_BASE + "/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ session_id: sessionId, message: text.trim() }),
    });
    if (res.status === 404) { // server restarted — start a fresh session
      sessionStorage.removeItem("nf_session"); sessionId = null;
      addError("Session expired — starting a fresh one. Please resend your message.");
      return;
    }
    if (!res.ok) throw new Error("Request failed (" + res.status + ")");

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const parts = buffer.split("\n\n");
      buffer = parts.pop();
      for (const part of parts) {
        if (!part.startsWith("data: ")) continue;
        const ev = JSON.parse(part.slice(6));
        if (ev.type === "text") {
          if (!bodyEl) bodyEl = addBotMsg();
          acc += ev.text;
          renderMarkdown(bodyEl, acc);
          setStatus("");
          scrollDown();
        } else if (ev.type === "status") {
          setStatus(ev.text);
        } else if (ev.type === "listing_updated") {
          refreshListing();
        } else if (ev.type === "ads_ready") {
          refreshAds();
        } else if (ev.type === "error") {
          addError(ev.text);
        } else if (ev.type === "done") {
          setStatus("");
        }
      }
    }
    pollAvatar(Date.now() + 4 * 60 * 1000);
  } catch (err) {
    addError(err.message.startsWith("Sofia is offline") ? err.message : "Connection problem: " + err.message);
  } finally {
    setStatus("");
    streaming = false;
    sendBtn.disabled = false;
    refreshListing();
    inputEl.focus();
  }
}

/* ---------- Sofia: talking-head video with voice fallback ---------- */

let muted = localStorage.getItem("nf_muted") === "1";
let avatarPollTimer = null;
let lastHandledAvatarTurn = null; // set on load so we never replay old videos

function updateMuteBtn() { $("mute-btn").textContent = muted ? "🔇" : "🔊"; }
$("mute-btn").onclick = () => {
  muted = !muted;
  localStorage.setItem("nf_muted", muted ? "1" : "0");
  $("sofia-video").muted = muted;
  if (muted) {
    speechSynthesis.cancel();
    if (sofiaAudio) { sofiaAudio.pause(); sofiaAudio = null; }
    document.querySelector(".sofia-wrap").classList.remove("speaking");
  }
  updateMuteBtn();
};
updateMuteBtn();
if ("speechSynthesis" in window) speechSynthesis.getVoices(); // warm voice list

function setSofiaStatus(text) {
  $("sofia-status").innerHTML = text ? '<span class="dot"></span>' + text : "";
}

function avatarTurnStarting() {
  clearTimeout(avatarPollTimer);
  speechSynthesis.cancel();
  const vid = $("sofia-video");
  vid.pause();
  vid.style.display = "none";
  $("sofia-img").style.display = "block";
  setSofiaStatus("");
}

function speakFallback(text) {
  if (muted || !text || !("speechSynthesis" in window)) return;
  const u = new SpeechSynthesisUtterance(text);
  const voices = speechSynthesis.getVoices();
  const v =
    voices.find(v => /aria|jenny|sonia|zira|samantha|female|woman/i.test(v.name) && v.lang.startsWith("en")) ||
    voices.find(v => v.lang.startsWith("en"));
  if (v) u.voice = v;
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

let sofiaAudio = null;
function playSofiaAudio(url, spokenFallback) {
  if (muted) return;
  const wrap = document.querySelector(".sofia-wrap");
  sofiaAudio = new Audio(url.startsWith("http") ? url : API_BASE + url);
  sofiaAudio.onplay = () => wrap.classList.add("speaking");
  sofiaAudio.onended = sofiaAudio.onerror = () => wrap.classList.remove("speaking");
  sofiaAudio.play().catch(() => speakFallback(spokenFallback)); // autoplay blocked etc.
}

function playSofiaVideo(url) {
  const img = $("sofia-img"), vid = $("sofia-video");
  vid.src = url;
  vid.muted = muted;
  vid.style.display = "block";
  img.style.display = "none";
  vid.onended = () => { vid.style.display = "none"; img.style.display = "block"; };
  vid.play().catch(() => { /* autoplay blocked — controls remain */ });
}

function pollAvatar(deadline) {
  clearTimeout(avatarPollTimer);
  if (!sessionId) return;
  fetch(API_BASE + "/api/avatar/" + sessionId)
    .then(r => (r.ok ? r.json() : null))
    .then(a => {
      if (!a) return;
      if (lastHandledAvatarTurn === null) lastHandledAvatarTurn = a.turn; // first sync
      if (a.status === "generating") {
        setSofiaStatus("Sofia is recording your video reply…");
        if (Date.now() < deadline) {
          avatarPollTimer = setTimeout(() => pollAvatar(deadline), 3000);
        } else {
          setSofiaStatus("");
          speakFallback(a.spoken);
          lastHandledAvatarTurn = a.turn;
        }
        return;
      }
      if (a.turn === lastHandledAvatarTurn) {
        // state not updated for the new turn yet — keep polling briefly
        if (Date.now() < deadline) avatarPollTimer = setTimeout(() => pollAvatar(deadline), 1500);
        return;
      }
      lastHandledAvatarTurn = a.turn;
      setSofiaStatus("");
      if (a.status === "ready" && a.url) {
        if (a.kind === "audio") playSofiaAudio(a.url, a.spoken); // free neural voice
        else playSofiaVideo(a.url);                              // fal.ai talking head
      } else {
        speakFallback(a.spoken); // failed or disabled -> browser voice
      }
    })
    .catch(() => {});
}

/* ---------- side panel ---------- */

async function refreshListing() {
  if (!sessionId) return;
  try {
    const res = await fetch(API_BASE + "/api/listing/" + sessionId);
    if (!res.ok) return;
    const { listing, missing_core_fields } = await res.json();

    const captured = Math.max(0, CORE_TOTAL - missing_core_fields.length);
    $("progress-label").textContent = captured + " of " + CORE_TOTAL + " core details captured";
    $("progress-bar").style.width = (captured / CORE_TOTAL * 100) + "%";

    const fields = $("fields");
    fields.innerHTML = "";
    let any = false;
    for (const [group, defs] of FIELD_GROUPS) {
      const present = defs.filter(([k]) => listing[k] !== undefined && listing[k] !== null && listing[k] !== "");
      if (!present.length) continue;
      any = true;
      const gl = document.createElement("div");
      gl.className = "group-label"; gl.textContent = group;
      fields.appendChild(gl);
      for (const [k, label] of present) {
        const row = document.createElement("div");
        row.className = "row";
        row.innerHTML = '<span class="k"></span><span class="v"></span>';
        row.querySelector(".k").textContent = label;
        row.querySelector(".v").textContent = fmt(listing[k]);
        fields.appendChild(row);
      }
    }
    if (listing.landmarks && listing.landmarks.length) {
      any = true;
      const gl = document.createElement("div");
      gl.className = "group-label"; gl.textContent = "Nearby";
      fields.appendChild(gl);
      for (const lm of listing.landmarks) {
        const row = document.createElement("div");
        row.className = "row";
        row.innerHTML = '<span class="k"></span><span class="v"></span>';
        row.querySelector(".k").textContent = lm.category || "place";
        row.querySelector(".v").textContent = lm.name + (lm.distance ? " · " + lm.distance : "");
        fields.appendChild(row);
      }
    }
    if (!any) fields.innerHTML = '<p class="empty-note">Details appear here as the conversation progresses.</p>';

    const priceArea = $("price-area");
    priceArea.innerHTML = "";
    const price = listing.asking_price_php || listing.suggested_price_php;
    if (price) {
      const card = document.createElement("div");
      card.className = "price-card";
      const isAsking = Boolean(listing.asking_price_php);
      let html = '<div class="label">' + (isAsking ? "Asking price" : "Suggested price") + "</div>" +
                 '<div class="big">' + php(price) + "</div>";
      const r = listing.suggested_price_range_php;
      if (r && r.low && r.high) html += '<div class="range">Market range ' + php(r.low) + " – " + php(r.high) + "</div>";
      if (listing.pricing_rationale) html += '<div class="rationale"></div>';
      card.innerHTML = html;
      if (listing.pricing_rationale) card.querySelector(".rationale").textContent = listing.pricing_rationale;
      priceArea.appendChild(card);
    }

    const compsArea = $("comps-area");
    compsArea.innerHTML = "";
    if (listing.comps && listing.comps.length) {
      const gl = document.createElement("div");
      gl.className = "group-label"; gl.textContent = "Comparables (" + listing.comps.length + ")";
      compsArea.appendChild(gl);
      for (const c of listing.comps) {
        const d = document.createElement("div");
        d.className = "comp";
        let line = '<span class="src"></span> — <span class="desc"></span>';
        if (c.price_php) line += "<br>" + php(c.price_php) + (c.price_per_sqm_php ? " · " + php(c.price_per_sqm_php) + "/sqm" : "");
        d.innerHTML = line;
        d.querySelector(".src").textContent = c.source || "source";
        d.querySelector(".desc").textContent = c.description || "";
        if (c.url) {
          const a = document.createElement("a");
          a.href = c.url; a.target = "_blank"; a.rel = "noopener"; a.textContent = " ↗";
          d.appendChild(a);
        }
        compsArea.appendChild(d);
      }
    }
  } catch { /* panel refresh is best-effort */ }
}

let currentAds = [];
async function refreshAds() {
  if (!sessionId) return;
  try {
    const res = await fetch(API_BASE + "/api/ads/" + sessionId);
    if (!res.ok) return;
    const { ads } = await res.json();
    currentAds = ads || [];
    const adsEl = $("ads");
    adsEl.innerHTML = "";
    if (!currentAds.length) {
      adsEl.innerHTML = '<p class="empty-note">No ad copies yet.</p>';
      $("download-ads").style.display = "none";
      $("download-pdf").style.display = "none";
      return;
    }
    $("download-ads").style.display = "";
    $("download-pdf").style.display = "";
    for (const ad of currentAds) {
      const card = document.createElement("div");
      card.className = "ad-card";
      card.innerHTML = '<span class="channel"></span><h3></h3><pre></pre>' +
                       '<button class="copy-btn">Copy text</button>';
      card.querySelector(".channel").textContent = (ad.channel || "copy").replace(/_/g, " ");
      card.querySelector("h3").textContent = ad.headline || "";
      card.querySelector("pre").textContent = ad.body || "";
      card.querySelector(".copy-btn").onclick = async (e) => {
        await navigator.clipboard.writeText((ad.headline ? ad.headline + "\n\n" : "") + (ad.body || ""));
        e.target.textContent = "Copied ✓";
        setTimeout(() => (e.target.textContent = "Copy text"), 1500);
      };
      adsEl.appendChild(card);
    }
  } catch { /* best-effort */ }
}

$("download-pdf").onclick = () => {
  if (sessionId) window.open(API_BASE + "/api/pdf/" + sessionId, "_blank");
};

$("download-ads").onclick = () => {
  const text = currentAds.map(a =>
    "== " + (a.channel || "copy").toUpperCase() + " ==\n" + (a.headline || "") + "\n\n" + (a.body || "")
  ).join("\n\n----------------------------------------\n\n");
  const blob = new Blob([text], { type: "text/plain" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "nextframe-ad-copies.txt";
  a.click();
  URL.revokeObjectURL(a.href);
};

$("new-listing").onclick = () => {
  sessionStorage.removeItem("nf_session");
  location.reload();
};

formEl.addEventListener("submit", (e) => {
  e.preventDefault();
  const text = inputEl.value;
  inputEl.value = "";
  inputEl.style.height = "auto";
  send(text);
});
inputEl.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    formEl.requestSubmit();
  }
});
inputEl.addEventListener("input", () => {
  inputEl.style.height = "auto";
  inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + "px";
});

welcome();
initApiBase().then(() => ensureSession()).then(() => {
  refreshListing();
  refreshAds();
  // Sync the avatar turn pointer without replaying an old video.
  fetch(API_BASE + "/api/avatar/" + sessionId)
    .then(r => (r.ok ? r.json() : null))
    .then(a => { if (a) lastHandledAvatarTurn = a.turn; })
    .catch(() => {});
}).catch(err => addError(err.message));
inputEl.focus();
</script>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Next-Frame Agency</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(20px); border-right: 1px solid #00f2ff; }
        .neon { text-shadow: 0 0 15px #00f2ff; }
        .scanlines { background: linear-gradient(to bottom, transparent 50%, rgba(0,0,0,0.3) 50%); background-size: 100% 4px; }
    </style>
</head>
<body class="bg-black text-white flex h-screen overflow-hidden font-sans antialiased">
    <div class="w-1/2 glass p-20 flex flex-col justify-center z-20 scanlines">
        <div class="border-l-4 border-teal-500 pl-8">
            <h1 class="text-teal-400 font-black italic text-5xl neon mb-2 tracking-tighter">NEXT-FRAME</h1>
            <h2 class="text-8xl font-extrabold tracking-tight leading-none mb-8">THE<br>ARCHITECT</h2>
            <p class="text-xl text-gray-400 mb-10 font-light">High-speed, AI-driven production out of Makati. Viral retention. Cinematic techwear.</p>
            <button class="bg-teal-500 text-black px-12 py-5 font-black uppercase tracking-widest hover:bg-white transition-all">Explore Work</button>
        </div>
    </div>
    <div class="w-full absolute right-0 h-full z-10">
        <img src="output/Hero_Avatar.jpg" class="w-full h-full object-cover opacity-90" alt="Architect Hero">
        <div class="absolute inset-0 bg-gradient-to-r from-black via-black/40 to-transparent"></div>
    </div>
</body>
</html>

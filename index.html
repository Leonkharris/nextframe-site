<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Nextframe.Ph — Human-Guided AI Execution</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet" />
    <style>
        html { scroll-behavior: smooth; }
        .animate-scan { animation: scan 4s linear infinite; }
        @keyframes scan { 0% { transform: translateY(0); } 100% { transform: translateY(100vh); } }
    </style>
</head>
<body class="bg-[#050505] text-white font-['Inter'] selection:bg-[#CCFF00] selection:text-black">

    <nav id="navbar" class="fixed top-0 w-full z-50 transition-all duration-300 py-6 px-6">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2 font-black italic text-2xl uppercase tracking-tighter">
                <span class="text-[#CCFF00]">✦</span> Nextframe<span class="text-[#00F0FF]">.Ph</span>
            </div>
            <div class="hidden md:flex gap-8 items-center text-xs font-bold uppercase tracking-widest text-white/70">
                <a href="#why" class="hover:text-[#CCFF00]">Why</a>
                <a href="#services" class="hover:text-[#CCFF00]">Tiers</a>
                <button onclick="openModal()" class="bg-[#00F0FF] text-black px-6 py-2 rounded-full font-black hover:bg-[#CCFF00] transition-all">Start The Conversation</button>
            </div>
        </div>
    </nav>

    <section class="relative min-h-screen flex items-center justify-center overflow-hidden">
        <div class="absolute inset-0 z-0">
            <video autoplay muted loop playsinline class="w-full h-full object-cover opacity-50">
                <source src="https://ce6vsiuf1fnatbbk.public.blob.vercel-storage.com/Commercial%20one%20-%20Jade%20bar%20v%202.5.mp4" type="video/mp4">
            </video>
            <div class="absolute inset-0 bg-gradient-to-b from-black via-black/40 to-black"></div>
        </div>
        
        <div class="relative z-10 text-center px-6">
            <h1 class="text-6xl md:text-8xl font-black uppercase italic tracking-tighter leading-none mb-6">
                The Human Bridge <br>
                <span class="text-transparent bg-clip-text bg-gradient-to-r from-[#00F0FF] to-[#CCFF00]">To AI Fidelity.</span>
            </h1>
            <p class="max-w-2xl mx-auto text-lg text-white/80 mb-10">
                We turn cold AI patterns into authentic brand stories. Like the paintbrush to the camera, AI changes the tool—but it can never replace the human storyteller.
            </p>
            <div class="flex flex-col md:flex-row gap-4 justify-center">
                <button onclick="openModal()" class="bg-[#CCFF00] text-black px-10 py-5 font-black uppercase italic text-xl hover:bg-white transition-all">Start The Conversation</button>
                <button onclick="document.getElementById('reel').scrollIntoView()" class="border border-white/20 bg-black/40 backdrop-blur-md px-10 py-5 font-black uppercase italic text-xl hover:bg-white/10 transition-all">View Showreel</button>
            </div>
        </div>
        <div class="absolute top-0 left-0 w-full h-1 bg-[#00F0FF] opacity-30 animate-scan"></div>
    </section>

    <section id="reel" class="py-24 bg-black px-6">
        <div class="max-w-5xl mx-auto">
            <div class="aspect-video rounded-3xl overflow-hidden border border-white/10 shadow-2xl">
                <video controls class="w-full h-full object-cover">
                    <source src="https://ce6vsiuf1fnatbbk.public.blob.vercel-storage.com/Commercial%20one%20-%20Jade%20bar%20v%202.5.mp4" type="video/mp4">
                </video>
            </div>
        </div>
    </section>

    <footer class="py-10 text-center border-t border-white/5 text-white/40 text-xs uppercase tracking-widest">
        SYSTEM: HUMAN_INTERFACE_ACTIVE // © 2026 NEXTFRAME.PH
    </footer>

    <div id="contact-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-6 bg-black/90 backdrop-blur-xl">
        <div class="bg-[#111] border border-white/10 p-8 rounded-3xl max-w-lg w-full relative">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-white/40">✕</button>
            <h2 class="text-2xl font-black uppercase italic mb-6">Start the Conversation</h2>
            <form class="space-y-4" onsubmit="event.preventDefault(); alert('Inquiry Sent!'); closeModal();">
                <input type="text" placeholder="Name" class="w-full bg-white/5 border border-white/10 p-3 rounded-xl outline-none focus:border-[#00F0FF]">
                <input type="email" placeholder="Email" class="w-full bg-white/5 border border-white/10 p-3 rounded-xl outline-none focus:border-[#00F0FF]">
                <textarea placeholder="Your Vision" class="w-full bg-white/5 border border-white/10 p-3 rounded-xl h-32 outline-none focus:border-[#00F0FF]"></textarea>
                <button class="w-full py-4 bg-[#CCFF00] text-black font-black uppercase italic rounded-xl">Deploy Inquiry</button>
            </form>
        </div>
    </div>

    <script>
        function openModal() { document.getElementById('contact-modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('contact-modal').classList.add('hidden'); }
        window.addEventListener('scroll', () => {
            const nav = document.getElementById('navbar');
            if(window.scrollY > 50) {
                nav.classList.add('bg-black/80', 'backdrop-blur-md', 'py-4');
                nav.classList.remove('py-6');
            } else {
                nav.classList.remove('bg-black/80', 'backdrop-blur-md', 'py-4');
                nav.classList.add('py-6');
            }
        });
    </script>
</body>
</html>

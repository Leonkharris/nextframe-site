<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nextframe.Ph — AI Video Execution</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: white; font-family: sans-serif; }
        .glow { text-shadow: 0 0 20px rgba(0, 240, 255, 0.5); }
    </style>
</head>
<body>
    <nav class="p-6 flex justify-between items-center max-w-7xl mx-auto">
        <div class="font-black italic text-2xl uppercase">Nextframe<span class="text-[#00F0FF]">.Ph</span></div>
        <button onclick="alert('Contact: hello@nextframe.ph')" class="bg-[#CCFF00] text-black px-6 py-2 rounded-full font-bold">Inquire</button>
    </nav>

    <main class="min-h-screen flex flex-col items-center justify-center text-center px-6">
        <h1 class="text-6xl md:text-8xl font-black italic uppercase leading-tight mb-6 glow">
            Stop Shooting.<br>
            <span class="text-[#00F0FF]">Start Visioning.</span>
        </h1>
        <p class="max-w-xl text-white/60 text-lg mb-10">
            Human-guided AI video execution for the next generation of brands. High fidelity. No friction.
        </p>
        <div class="flex gap-4">
            <button class="bg-[#00F0FF] text-black px-8 py-4 font-black uppercase italic rounded-sm">View Tiers</button>
            <button class="border border-white/20 px-8 py-4 font-black uppercase italic rounded-sm">Watch Reel</button>
        </div>
    </main>

    <section class="py-20 bg-white/5 text-center">
        <h2 class="text-3xl font-black mb-10 uppercase italic">Pricing Tiers</h2>
        <div class="max-w-4xl mx-auto grid md:grid-cols-2 gap-8 px-6">
            <div class="p-10 border border-white/10 rounded-2xl bg-black">
                <h3 class="text-[#CCFF00] font-bold uppercase mb-2">AI Spotlight</h3>
                <div class="text-4xl font-black mb-4">₱15,000</div>
                <p class="text-sm text-white/50 italic">One high-fidelity hero commercial.</p>
            </div>
            <div class="p-10 border border-[#00F0FF] rounded-2xl bg-black">
                <h3 class="text-[#00F0FF] font-bold uppercase mb-2">Content Engine</h3>
                <div class="text-4xl font-black mb-4">₱70,000</div>
                <p class="text-sm text-white/50 italic">Full monthly AI video pipeline.</p>
            </div>
        </div>
    </section>
</body>
</html>
